<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class=" bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 overflow-hidden">
  <!-- Navbar -->
  <header class="fixed top-0 left-0 w-full z-50">

    <!-- Navbar bar -->
    <nav class="flex items-center justify-between p-4 bg-black/20 backdrop-blur-md border-b border-white/10">

      <!-- Logo -->
      <img src="Images/Logo/Logo.png" alt="ECHO Logo" class="w-24" />

      <!-- Desktop links -->
      <ul class="hidden sm:flex gap-6">
        <li><a href="shop.html" class="text-white font-semibold hover:text-blue-400">Shop</a></li>
        <li><a href="about.html" class="text-white font-semibold hover:text-blue-400">About</a></li>
        <li><a href="contact.html" class="text-white font-semibold hover:text-blue-400">Contact</a></li>
        <li><a href="login.html" class="text-white font-semibold hover:text-blue-400">Login</a></li>
        <li><a href="cart.html" class="text-white font-semibold hover:text-blue-400">Cart</a></li>
      </ul>

      <!-- Mobile button -->
      <button id="menu-btn" class="sm:hidden text-white text-2xl z-50 relative" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
    </nav>

    <!-- Mobile menu (IMPORTANT FIX) -->
    <div id="mobile-menu" class="hidden sm:hidden fixed top-[64px] left-0 w-full bg-black/80 backdrop-blur-md z-40">

      <ul class="flex flex-col p-6 gap-4">
        <li><a href="shop.html" class="text-white block">Shop</a></li>
        <li><a href="about.html" class="text-white block">About</a></li>
        <li><a href="contact.html" class="text-white block">Contact</a></li>
        <li><a href="login.html" class="text-white block">Login</a></li>
        <li><a href="cart.html" class="text-white block">Cart</a></li>
      </ul>

    </div>
  </header>



  <!-- Hero Section -->
  <div class="w-full min-h-screen bg-gray-100 flex items-center justify-center p-6 md:p-10">

    <div class="relative w-full max-w-6xl bg-white shadow-2xl overflow-hidden">

      <!-- Background split -->
      <div class="absolute inset-0 flex">
        <div class="w-1/2 bg-gradient-to-br from-gray-200 to-gray-100"></div>
        <div class="w-1/2 bg-white"></div>
      </div>

      <!-- CONTENT WRAPPER -->
      <div class="relative z-10 flex flex-col md:flex-row items-center">

        <!-- LEFT CONTENT -->
        <div class="w-full md:w-1/2 p-8 md:p-14 flex flex-col justify-center text-center md:text-left">

          <p class="text-xs md:text-sm uppercase tracking-widest text-gray-600">
            Women's Sweatshirt
          </p>

          <h1 class="text-4xl md:text-5xl font-semibold tracking-tight leading-tight mt-4 text-gray-900">
            SHOP NEW<br />ARRIVALS
          </h1>

          <button
            class="mt-6 md:mt-8 px-6 py-3 bg-black text-white text-sm uppercase tracking-widest hover:bg-gray-900 transition w-fit mx-auto md:mx-0">
            <a href="shop.html" class="text-white font-semibold hover:text-blue-400">Shop Now</a>
          </button>

        </div>

        <!-- RIGHT IMAGE -->
        <div class="w-full md:w-1/2 flex justify-center md:justify-end items-end">

          <img src="Images/Login/Login.jpg" class="w-full object-cover object-top
                 h-[420px] sm:h-[500px] md:h-[860px]" alt="model" />

        </div>

      </div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => menu.classList.toggle('hidden'));
  </script>

</body>

</html>
