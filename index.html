<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .fade-up {
      animation: fadeUp 1s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .zoom-img {
      transition: transform 1.2s ease;
    }

    .zoom-img:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body class=" bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 overflow-hidden text-white text-center">
  <!-- Header -->
 <header class="relative z-50 bg-fuchsia-900 text-white">
    <nav class="p-4 flex items-center justify-between flex-wrap bg-fuchsia-900 backdrop-blur-md border-b border-white/10">

      <!-- Logo -->
      <a href="index.html" class="hover:opacity-80 transition duration-300">
        <img src="Images/Logo/Logo.png" alt="ECHO Logo" class="w-24 h-auto mx-auto sm:mx-0">
      </a>

      <!-- Desktop Links -->
      <ul class="hidden sm:flex space-x-6 list-none p-0 m-0">
        <li><a href="shop.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer">Shop</a></li>
        <li><a href="about.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer">About</a></li>
        <li><a href="contact.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer">Contact</a></li>
        <li><a href="login.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer">Login</a></li>
        <li><a href="cart.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer">Cart</a></li>
      </ul>

      <!-- Mobile Hamburger -->
      <button id="menu-btn" class="sm:hidden text-white focus:outline-none" aria-label="menu button">
        <i class="fas fa-bars text-2xl"></i>
      </button>
    </nav>

    <!-- Mobile Menu -->
    <ul id="mobile-menu" class="hidden flex-col space-y-4 p-4 bg-fuchsia-900 sm:hidden absolute w-full top-full left-0 z-40">
      <li><a href="shop.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer block">Shop</a></li>
      <li><a href="about.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer block">About</a></li>
      <li><a href="contact.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer block">Contact</a></li>
      <li><a href="login.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer block">Login</a></li>
      <li><a href="cart.html" class="text-white hover:underline-offset-8 hover:underline cursor-pointer block">Cart</a></li>
    </ul>
  </header>



  <!-- Hero Section -->
  <div class="w-full min-h-screen bg-gray-100 flex items-center justify-center p-6 md:p-10">

    <div class="relative w-full max-w-6xl bg-white shadow-2xl overflow-hidden fade-up">

      <!-- Background -->
      <div class="absolute inset-0 flex">
        <div class="w-1/2 bg-gradient-to-br from-gray-200 to-gray-100"></div>
        <div class="w-1/2 bg-white"></div>
      </div>

      <div class="relative z-10 flex flex-col md:flex-row items-center">

        <!-- TEXT -->
        <div class="w-full md:w-1/2 p-8 md:p-14 text-center md:text-left">

          <p class="text-xs md:text-sm uppercase tracking-widest text-gray-600">
            New Collection
          </p>

          <h1 class="text-4xl md:text-5xl font-semibold leading-tight mt-4 text-gray-900">
            SHOP NEW<br />ARRIVALS
          </h1>


          <a href="shop.html" class="mt-6 md:mt-8 inline-block px-6 py-3 bg-fuchsia-600 text-white text-sm font-semibold uppercase tracking-widest
         hover:bg-fuchsia-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-fuchsia-500
         transition transform hover:scale-105">
            Shop Now
          </a>
        </div>

        <!-- IMAGE -->
        <div class="w-full md:w-1/2 flex justify-center md:justify-end items-end overflow-hidden">

          <img src="Images/Home/Home.jpg" class="w-full object-cover object-top
                 h-[420px] sm:h-[500px] md:h-[860px] zoom-img" alt="model" />

        </div>

      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => menu.classList.toggle('hidden'));
  </script>

</body>

</html>
