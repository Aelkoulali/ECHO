<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Home</title>
    <link rel="stylesheet" href="dist/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100 text-center">
    <!-- Navbar header  -->
    <header>
        <nav class="bg-black shadow p-4 flex items-center justify-between gap-6 flex-wrap">
            <!-- Logo -->
            <img src="Images/Logo/Logo.png" alt="ECHO Logo" class="w-24 h-auto mx-auto sm:mx-0">

            <!-- Navigation Links and Search -->
            <div class="flex items-center gap-6">
                <!-- Navigation Links -->
                <ul class="flex space-x-6 list-none p-0 m-0">
                    <li><a href="shop.html" aria-label="shop" class="text-white hover:text-blue-500">Shop</a></li>
                    <li><a href="about.html" aria-label="about" class="text-white hover:text-blue-500">About</a></li>
                    <li><a href="contact.html" aria-label="contact" class="text-white hover:text-blue-500">Contact</a>
                    </li>
                    <li><a href="account.html" aria-label="account" class="text-white hover:text-blue-500">Login</a></li>
                    <li><a href="cart.html" aria-label="cart" class="text-white hover:text-blue-500">Cart</a></li>
                </ul>
            </div>
        </nav>
    </header>


    <!-- Hero Section with Background Image -->
    <section class="relative h-screen bg-[url('Images/Home/Hero.jpg')] bg-cover bg-center bg-no-repeat min-h-screen"
        style="background-image: url('Images/Home/Hero.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
        <!-- No Overlay - Pure Image -->
        <!-- Content -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/20 to-black/60 z-0"></div>
        <!-- Content -->
        <div class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-4">
            <h1 class="text-5xl md:text-6xl font-bold mb-6 drop-shadow-2xl">Welcome to ECHO</h1>
            <p class="text-xl md:text-2xl mb-8 max-w-2xl drop-shadow-lg">Discover luxury fashion and premium products
            </p>
            <a href="shop.html"
                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-lg text-lg transition duration-300 drop-shadow-lg">Shop
                Now</a>
        </div>
    </section>
</body>

</html>
