<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO</title>
    <link rel="stylesheet" href="dist/styles.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="bg-gray-100 text-center">

    <!-- Header -->
    <header>
        <nav class="bg-black shadow p-4 flex flex-col md:flex-row items-center justify-between">
            <div class="text-white text-2xl font-bold p-2">ECHO</div>
            <ul class="flex space-x-4 list-none p-0 m-2 justify-center">
                <li><a href="products.html" class="text-white hover:text-blue-500">Products</a></li>
                <li><a href="about.html" class="text-white hover:text-blue-500">About</a></li>
                <li><a href="contact.html" class="text-white hover:text-blue-500">Contact</a></li>
                <li><a href="account.html"><i class="fa fa-user text-white hover:text-blue-500"></i></a></li>
                <li><a href="cart.html"><i class="fa fa-shopping-cart text-white hover:text-blue-500"></i></a></li>
            </ul>
            <input type="text" placeholder="Search..."
                class="ml-0 md:ml-4 p-1 rounded bg-gray-800 text-white max-w-xs w-full md:w-auto" />
        </nav>
    </header>

    <!-- Carousel -->
    <div class="relative w-4/5 mx-auto mt-10 overflow-hidden rounded-lg">
        <div class="relative w-full max-w-4xl mx-auto mt-10 overflow-hidden rounded-lg">
    <div id="carousel-slides" class="flex transition-transform duration-500">
        <img src="Images/About/Item1.jpg" class="w-full flex-shrink-0 object-cover" alt="1">
        <img src="Images/About/Item2.jpg" class="w-full flex-shrink-0 object-cover" alt="2">
        <img src="Images/About/Item3.jpg" class="w-full flex-shrink-0 object-cover" alt="3">
        <img src="Images/About/Item4.jpg" class="w-full flex-shrink-0 object-cover" alt="4">
        <img src="Images/About/Item5.jpg" class="w-full flex-shrink-0 object-cover" alt="5">
    </div>
</div>
        <button id="prev"
            class="absolute top-1/2 left-2 -translate-y-1/2 bg-white/30 hover:bg-white/50 rounded-full w-10 h-10 flex items-center justify-center">
            &#10094;
        </button>
        <button id="next"
            class="absolute top-1/2 right-2 -translate-y-1/2 bg-white/30 hover:bg-white/50 rounded-full w-10 h-10 flex items-center justify-center">
            &#10095;
        </button>
    </div>

    <!-- Footer -->
    <footer class="bg-black text-white text-center w-full p-4 mt-8">
        &copy; 2026 ECHO - All rights reserved
    </footer>

    <!-- Carousel JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.getElementById('carousel-slides');
            const total = slides.children.length;
            let index = 0;

            document.getElementById('next').addEventListener('click', () => {
                index = (index + 1) % total;
                slides.style.transform = `translateX(-${index * 100}%)`;
            });

            document.getElementById('prev').addEventListener('click', () => {
                index = (index - 1 + total) % total;
                slides.style.transform = `translateX(-${index * 100}%)`;
            });
        });
    </script>

</body>

</html>
