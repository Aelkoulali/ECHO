<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO</title>
    <link rel="stylesheet" href="dist/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="bg-gray-100 text-center">
    <!-- Header -->
    <header>
        <nav class="bg-black shadow p-4">
            <div class="text-white text-2xl font-bold p-4">ECHO</div>
            <ul class="flex space-x-4 justify-center list-none p-0 m-0">
                <li><a href="product-page@1.0.0" class="text-white hover:text-blue-500">Products</a></li>
                <li><a href="about.html" class="text-white hover:text-blue-500">About</a></li>
                <li><a href="contact.html" class="text-white hover:text-blue-500">Contact</a></li>
                <li><a href="account.html"><i class="fa fa-user text-white hover:text-blue-500"></i></a></li>
                <li><a href="cart.html"><i class="fa fa-shopping-cart text-white hover:text-blue-500"></i></a></li>
                <input type="text" placeholder="Search..." class="ml-4 p-1 rounded bg-gray-800 text-white max-w-xs"
                    style="width: 100%; max-width: 200px;" />
            </ul>
        </nav>
    </header>    
    <div class="relative w-full h-72 overflow-hidden mt-8 flex-nowrap">
        <div id="carousel" class="flex h-full transition-transform duration-700 ease-in-out">
            <div class="flex-shrink-0 w-full h-full">
                <img src="Images/About/Item1.jpg" alt="Slide 1" class="w-full h-full object-cover">
            </div>
            <div class="flex-shrink-0 w-full h-full">
                <img src="Images/About/Item2.jpg" alt="Slide 2" class="w-full h-full object-cover">
            </div>
            <div class="flex-shrink-0 w-full h-full">
                <img src="Images/About/Item3.jpg" alt="Slide 3" class="w-full h-full object-cover">
            </div>
        </div>
    </div>    
    <section class="text-gray-700 body-font">

    
    <!-- Footer -->
    <footer class="bg-black text-white text-center w-full p-4 mt-8">
        &copy; 2026 ECHO - All rights reserved
    </footer>
    <script>
        const carousel = document.getElementById('carousel');
        let index = 0;

        setInterval(() => {
            index = (index + 1) % 3; // Assuming there are 3 slides
            carousel.style.transform = `translateX(-${index * 100}%)`;
        }, 3000); // Change slide every 3 seconds  

    </script>
</body>

</html>
