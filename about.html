<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO</title>
    <link rel="stylesheet" href="dist/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100 text-center">
    <!-- Header - Updated FA v6 -->
    <header>
        <nav class="bg-black shadow p-4 flex items-center justify-center gap-6 flex-wrap">
            <img src="Images/Logo/Logo.png" alt="ECHO Logo" class="w-24 h-auto mx-auto sm:mx-0">
            <ul class="flex space-x-6 justify-center list-none p-0 m-0">
                <li><a href="products.html" class="text-white hover:text-blue-500">Products</a></li>
                <li><a href="about.html" class="text-white hover:text-blue-500">About</a></li>
                <li><a href="contact.html" class="text-white hover:text-blue-500">Contact</a></li>
                <li><a href="account.html"><i class="fas fa-user text-white hover:text-blue-500"></i></a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart text-white hover:text-blue-500"></i></a></li>
                <input type="text" placeholder="Search..." class="ml-4 p-1 rounded bg-gray-800 text-white max-w-xs"
                    style="width: 100%; max-width: 200px;" />
            </ul>
        </nav>
    </header>

    <div class="relative w-[95%] max-w-7xl mx-auto h-[70vh] overflow-hidden mt-8 flex">
        <div id="carousel" class="flex h-full w-full transition-transform duration-1000 ease-in-out">
            <div class="flex-shrink-0 w-full h-full transition-transform duration-1000 ease-in-out">
                <img src="Images/About/Item1.jpg" alt="Slide 1" class="w-full h-full object-cover">
            </div>
            <div class="flex-shrink-0 w-full h-full transition-transform duration-1000 ease-in-out">
                <img src="Images/About/Item2.jpg" alt="Slide 2" class="w-full h-full object-cover">
            </div>
            <div class="flex-shrink-0 w-full h-full transition-transform duration-1000 ease-in-out">
                <img src="Images/About/Item3.jpg" alt="Slide 3" class="w-full h-full object-cover">
            </div>
        </div>
    </div>

    <!-- Enhanced Footer -->
    <footer class="bg-black text-white mt-12 lg:mt-20 py-12 px-4">
      <div class="max-w-6xl mx-auto flex flex-col sm:flex-row gap-4 sm:gap-8 mb-8 items-center sm:items-start justify-center px-4 md:px-0">
        <!-- 1. Logo Column -->
        <div class="text-left flex-shrink-0 w-36">
          <img src="Images/Logo/Logo.png" alt="ECHO" class="w-20 h-auto mb-2">          
          <p class="text-xs leading-tight">ECHO Luxury Fashion.</p>
        </div>
        <!-- 2. Company Column -->
        <div>
          <h4 class="text-lg font-bold mb-6">Company</h4>
          <ul class="space-y-2 text-sm">
            <li><a href="about.html" class="hover:text-blue-400 transition">About Us</a></li>
            <li><a href="#" class="hover:text-blue-400 transition">Privacy Policy</a></li>
            <li><a href="#" class="hover:text-blue-400 transition">Terms of Service</a></li>
          </ul>
        </div>
        <!-- 3. Quick Links Column -->
        <div>
          <h4 class="text-lg font-bold mb-6 text-left">Quick Links</h4>
          <ul class="space-y-2 text-sm">
            <li><a href="home.html" class="hover:text-blue-400 transition">Home</a></li>
            <li><a href="products.html" class="hover:text-blue-400 transition">Products</a></li>
            <li><a href="about.html" class="hover:text-blue-400 transition">About</a></li>
            <li><a href="contact.html" class="hover:text-blue-400 transition">Contact</a></li>
            <li><a href="account.html" class="hover:text-blue-400 transition">Account</a></li>
            <li><a href="cart.html" class="hover:text-blue-400 transition">Cart</a></li>
          </ul>
        </div>
        <!-- 4. Social Column -->
        <div>
          <h4 class="text-lg font-bold mb-6 text-left">Follow Us</h4>
          <div class="flex justify-center lg:justify-start space-x-4">
            <a href="#" class="text-xl hover:text-blue-400 transition"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="text-xl hover:text-blue-400 transition"><i class="fab fa-instagram"></i></a>
            <a href="#" class="text-xl hover:text-blue-400 transition"><i class="fab fa-twitter"></i></a>
            <a href="#" class="text-xl hover:text-blue-400 transition"><i class="fab fa-youtube"></i></a>
          </div>
        </div>
        <!-- 5. Newsletter Column -->
        <div class="flex-shrink-0 w-36 text-left">
          <h4 class="text-base font-bold mb-2">Newsletter</h4>
          <p class="text-xs mb-2 opacity-75">Latest drops</p>
          <form class="flex flex-col gap-1">
            <input type="email" placeholder="Email" class="p-1 text-sm bg-gray-800 border border-gray-600 rounded focus:outline-none focus:border-blue-500">
            <button type="submit" class="px-4 py-1 text-xs bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded transition">Subscribe</button>
          </form>
        </div>
      </div>
      <div class="border-t border-gray-800 pt-6 text-center text-sm opacity-75">
        <p>&copy; 2026 ECHO - All rights reserved.</p>        
      </div>
    </footer>
    <script>
        const carousel = document.getElementById('carousel');
        let index = 0;

        setInterval(() => {
            index = (index + 1) % 3; // Assuming there are 3 slides
            carousel.style.transform = `translateX(-${index * 100}%)`;
        }, 3000); // Change slide every 3 seconds  

    </script>
</body>

</html>
